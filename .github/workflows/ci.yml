name: CI / CD

# ── 触发条件 ────────────────────────────────────────────────────────────────────
# • push tag v*.*.* → release only（单独的精简流程）
# • PR to main/develop → build + lint
on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write   # release job 需要写权限创建 GitHub Release

# ── 公共环境变量 ────────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  APP_SLUG: 'open-wifi'          # APK 文件名前缀（纯英文，避免中文被 URL 编码）

# ════════════════════════════════════════════════════════════════════════════════
# Job 1: PR Build & Lint（仅 PR 触发）
# ════════════════════════════════════════════════════════════════════════════════
jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'   # 仅 PR 触发，Tag 跳过

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── Lint ──────────────────────────────────────────────────────────────────
      - name: Run Lint
        run: ./gradlew lint --stacktrace

      - name: Upload Lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-results-${{ github.sha }}
          path: '**/build/reports/lint-results*.html'
          retention-days: 7

      # ── Debug APK ─────────────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
  
  # ════════════════════════════════════════════════════════════════════════════════
  # Job 2: Release（仅 Tag push 触发）
  # 签名所需 Secrets：KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
  # ════════════════════════════════════════════════════════════════════════════════
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: startsWith(github.ref, 'refs/tags/v')   # 仅 Tag push 触发

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 获取完整 Git 历史，用于生成 Changelog

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 从 Tag 解析版本号 ──────────────────────────────────────────────────────
      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"         # e.g. v1.2.3
          VERSION="${TAG#v}"                      # e.g. 1.2.3
          # x.y.z → 10203（versionCode 格式）
          VERSION_CODE=$(echo "$VERSION" | awk -F. '{ printf "%d%02d%02d", $1, $2, $3 }')
          echo "tag=$TAG"                  >> $GITHUB_OUTPUT
          echo "version=$VERSION"          >> $GITHUB_OUTPUT
          echo "versionCode=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "📦 Tag: $TAG | Version: $VERSION | VersionCode: $VERSION_CODE"

      # ── 从 strings.xml 读取 app_name（用于 Release 标题，保留中文仅用于展示）────
      - name: Extract app_name from strings.xml
        id: app_name
        run: |
          APP_NAME=$(grep '<string name="app_name">' app/src/main/res/values/strings.xml \
            | sed 's/.*<string name="app_name">\(.*\)<\/string>.*/\1/')
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "🏷️ app_name: $APP_NAME"

      # ── 还原签名 Keystore ─────────────────────────────────────────────────────
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > $GITHUB_WORKSPACE/release.jks
          echo "✅ Keystore decoded to release.jks"

      # ── 构建签名 Release APK ───────────────────────────────────────────────────
      # app/build.gradle 通过 project.hasProperty 读取以下 -P 参数
      - name: Build Release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_FILE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
            -PversionName="${{ steps.version.outputs.version }}" \
            -PversionCode="${{ steps.version.outputs.versionCode }}" \
            --stacktrace

      # ── 整理产物（重命名为 {APP_SLUG}-{tag}.apk，纯英文避免下载链接乱码）────────
      - name: Collect APK artifacts
        run: |
          mkdir -p artifacts
          TAG="${{ steps.version.outputs.tag }}"
          for f in app/build/outputs/apk/release/*.apk; do
            [ -f "$f" ] && cp "$f" "artifacts/${APP_SLUG}-${TAG}.apk"
          done
          echo "📂 Artifacts:"
          ls -lh artifacts/

      # ── 生成 Changelog ────────────────────────────────────────────────────────
      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG"     >> $GITHUB_OUTPUT
          echo "EOF"            >> $GITHUB_OUTPUT

      # ── 发布 GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## 📦 ${{ steps.app_name.outputs.app_name }} ${{ steps.version.outputs.tag }}

            **Version:** `${{ steps.version.outputs.version }}`
            **Version Code:** `${{ steps.version.outputs.versionCode }}`
            **Build:** `${{ github.sha }}`

            ### 📋 What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ---
            > 构建时间：${{ github.event.head_commit.timestamp }}
          files: artifacts/*.apk
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 清理签名文件 ───────────────────────────────────────────────────────────
      - name: Cleanup keystore
        if: always()
        run: rm -f $GITHUB_WORKSPACE/release.jks
